<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal | StrideX AI</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo" style="font-size: 1.5rem; font-weight: 800; color: var(--accent);">StrideX</div>
            <nav>
                <ul class="nav-list">
                    <li class="nav-item active"><a href="index.html"><span>Dashboard</span></a></li>
                    <li class="nav-item"><a href="students.html"><span>My Children</span></a></li>
                    <li class="nav-item"><a href="book-session.html"><span>Book Session</span></a></li>
                    <li class="nav-item"><a href="search-coaches.html"><span>Find a Coach</span></a></li>
                    <li class="nav-item"><a href="payments.html"><span>Payments</span></a></li>
                    <li class="nav-item"><a href="progress.html"><span>Progress</span></a></li>
                    <li class="nav-item"><a href="reports.html"><span>Reports</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div>
                    <h1 class="fade-in">Parent Portal</h1>
                    <p style="color: var(--text-muted);">Manage your children's coaching and progress.</p>
                </div>
                <button class="btn btn-primary">Purchase Credits</button>
            </header>

            <div class="students-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
                <div class="glass-card fade-in" style="animation-delay: 0.1s;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
                        <div>
                            <h3 style="color: var(--accent);">Marcus B.</h3>
                            <p style="font-size: 0.875rem; color: var(--text-muted);">U14 Representative Squad</p>
                        </div>
                        <div style="background: var(--success); color: #000; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700;">ACTIVE</div>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <div style="font-size: 0.875rem; margin-bottom: 0.5rem;">Remaining Credits</div>
                        <div style="font-size: 1.5rem; font-weight: 800;">12</div>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn btn-outline" style="flex: 1; font-size: 0.75rem;">View Sessions</button>
                        <button class="btn btn-outline" style="flex: 1; font-size: 0.75rem;">Latest Report</button>
                    </div>
                </div>

                <div class="glass-card fade-in" style="animation-delay: 0.2s;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
                        <div>
                            <h3 style="color: var(--accent);">Sarah B.</h3>
                            <p style="font-size: 0.875rem; color: var(--text-muted);">Junior Blasters</p>
                        </div>
                        <div style="background: var(--warning); color: #000; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700;">LOW CREDITS</div>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <div style="font-size: 0.875rem; margin-bottom: 0.5rem;">Remaining Credits</div>
                        <div style="font-size: 1.5rem; font-weight: 800;">2</div>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn btn-primary" style="flex: 1; font-size: 0.75rem;">Top Up</button>
                        <button class="btn btn-outline" style="flex: 1; font-size: 0.75rem;">View Sessions</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../assets/js/main.js"></script>
</body>
</html>
