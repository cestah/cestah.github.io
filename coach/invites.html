<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Students | Coach Dashboard</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo" style="font-size: 1.5rem; font-weight: 800; color: var(--accent);">StrideX</div>
            <nav>
                <ul class="nav-list">
                    <li class="nav-item"><a href="index.html"><span>Dashboard</span></a></li>
                    <li class="nav-item"><a href="sessions.html"><span>Sessions</span></a></li>
                    <li class="nav-item"><a href="drills.html"><span>Drill Library</span></a></li>
                    <li class="nav-item"><a href="video-analysis.html"><span>Video Analysis</span></a></li>
                    <li class="nav-item"><a href="progress.html"><span>Student Progress</span></a></li>
                    <li class="nav-item"><a href="earnings.html"><span>Earnings</span></a></li>
                    <li class="nav-item active"><a href="invites.html"><span>Invites</span></a></li>
                    <li class="nav-item"><a href="profile.html"><span>My Profile</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div>
                    <h1 class="fade-in">Invite Students</h1>
                    <p style="color: var(--text-muted);">Grow your coaching cohort by inviting students and parents.</p>
                </div>
            </header>

            <div class="glass-card fade-in" style="max-width: 600px;">
                <h3 style="margin-bottom: 1.5rem;">Send Onboarding Invite</h3>
                <form style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.875rem; color: var(--text-muted);">Recipient Email</label>
                        <input type="email" placeholder="parent@example.com" style="padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-main); outline: none;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.875rem; color: var(--text-muted);">Custom Message (Optional)</label>
                        <textarea rows="3" style="padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-main); outline: none; resize: none;">Hi! Join me on StrideX for AI-powered cricket coaching and video analysis.</textarea>
                    </div>
                    <button type="button" class="btn btn-primary" style="justify-content: center;" onclick="alert('Invitation Sent!')">Send Invitation</button>
                </form>
            </div>

            <section class="glass-card fade-in" style="margin-top: 2rem; animation-delay: 0.1s;">
                <h3 style="margin-bottom: 1.5rem;">Pending Invitations</h3>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div style="padding: 1rem; background: var(--glass-bg); border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
                        <span>m.miller@gmail.com</span>
                        <div style="display: flex; gap: 1rem; align-items: center;">
                            <span style="font-size: 0.75rem; color: var(--warning);">PENDING</span>
                            <button class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size: 0.75rem;">Resend</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="../assets/js/main.js"></script>
</body>
</html>
