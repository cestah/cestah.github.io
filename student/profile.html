<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Profile | StrideX AI</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo" style="font-size: 1.5rem; font-weight: 800; color: var(--accent);">StrideX</div>
            <nav>
                <ul class="nav-list">
                    <li class="nav-item"><a href="index.html"><span>Dashboard</span></a></li>
                    <li class="nav-item"><a href="sessions.html"><span>My Sessions</span></a></li>
                    <li class="nav-item"><a href="drills.html"><span>Practice Drills</span></a></li>
                    <li class="nav-item"><a href="video-analysis.html"><span>AI Feedback</span></a></li>
                    <li class="nav-item"><a href="progress.html"><span>My Progress</span></a></li>
                    <li class="nav-item active"><a href="profile.html"><span>My Profile</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div>
                    <h1 class="fade-in">Student Profile</h1>
                    <p style="color: var(--text-muted);">Manage your profile information</p>
                </div>
            </header>

            <div class="profile-grid" style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;">
                <section class="glass-card fade-in">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <div
                            style="width: 120px; height: 120px; background: var(--accent); border-radius: 50%; margin: 0 auto 1.5rem;">
                        </div>
                        <button class="btn btn-outline" style="font-size: 0.75rem;">Change Photo</button>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 1rem;">
                        <div style="font-size: 0.875rem;">
                            <div style="color: var(--text-muted); margin-bottom: 0.25rem;">Club 1 </div>
                            <div style="font-weight: 700;">Team A</div>
                        </div>
                        <div style="font-size: 0.875rem;">
                            <div style="color: var(--text-muted); margin-bottom: 0.25rem;">Club 2</div>
                            <div style="font-weight: 700;">Team B CC</div>
                        </div>
                    </div>
                </section>

                <section class="glass-card fade-in" style="animation-delay: 0.1s;">
                    <form style="display: flex; flex-direction: column; gap: 1.5rem;">
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label style="font-size: 0.875rem; color: var(--text-muted);">Professional Bio</label>
                            <textarea rows="4"
                                style="padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-main); outline: none; resize: none;">Elite level coach with 15+ years of experience in state-level cricket. Specializing in fast bowling biomechanics and player mental conditioning.</textarea>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label style="font-size: 0.875rem; color: var(--text-muted);">Specialties (Comma
                                separated)</label>
                            <input type="text" value="Fast Bowling, Middle Order Batting"
                                style="padding: 0.75rem; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-main); outline: none;">
                        </div>
                        <button type="button" class="btn btn-primary"
                            style="align-self: flex-end; padding: 0.75rem 2rem;">Save Changes</button>
                    </form>
                </section>
            </div>
        </main>
    </div>
    <script src="../assets/js/main.js"></script>
</body>

</html>
